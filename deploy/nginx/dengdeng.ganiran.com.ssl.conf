server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dengdeng.ganiran.com;

    ssl_certificate /etc/letsencrypt/live/dengdeng.ganiran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dengdeng.ganiran.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Responses/Codex requests may include a full working context or inline
    # image data. The extra MiB lets the gateway return a structured JSON 413
    # when its 64 MiB application limit is exceeded.
    client_max_body_size 65m;
    client_body_timeout 120s;

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
